name: Docker Build, Scan and Push

on:
  push:
    branches:
      - main

env:
  # Docelowe repozytorium obrazow (GHCR)
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/weather-app
  # Repozytorium dla cache (DockerHub)
  CACHE_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/weather-app-cache

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja QEMU dla wielu architektur
        uses: docker/setup-qemu-action@v3

      - name: Konfiguracja Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logowanie do DockerHub (dla systemu cache)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Logowanie do GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # KROK A: Budowanie lokalne tylko dla architektury bazowej w celu skanowania
      - name: Budowanie obrazu do testu Trivy
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: local-weather-app:test
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:main

      # KROK B: Skanowanie bezpieczenstwa (wymog c)
      - name: Test CVE obrazu za pomoca Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-weather-app:test'
          format: 'table'
          # Kod bledu '1' przerywa pipeline jesli znajdzie krytyczne podatnosci
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # KROK C: Budowanie docelowe i wysylka (wykona sie tylko jesli test CVE przejdzie pomyslnie)
      - name: Budowanie wieloarchitekturowe i push do GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:main
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:main,mode=max
